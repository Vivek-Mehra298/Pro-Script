<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" role="img" aria-label="Subtle abstract background">
  <defs>
    <linearGradient id="wash" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6F3EE"/>
      <stop offset="0.55" stop-color="#F2EEE8"/>
      <stop offset="1" stop-color="#F7F5F1"/>
